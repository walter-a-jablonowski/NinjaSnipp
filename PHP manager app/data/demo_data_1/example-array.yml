id: example-array v1
version: 3
sc: arr--
short: JavaScript array with common operations
usage:
  head: |
    Quick JS array scaffold with a chosen operation pre-wired.

    - Covers push, pop, shift, unshift, slice, splice
    - Token usage: minimal
  vars:
    name: Variable name for the array
    items: Initial items (comma-separated)
    action: Operation to apply
    value: Value passed to the operation
  text: |
    ### Usage

    - Pick an `action` from the dropdown
    - Set `name` to your desired variable name
    - Adjust `items` for initial array contents

    ### Limitations

    - Single operation per snippet; compose multiple for complex flows

    <secondary>

    ### Explanation

    - Kept intentionally minimal — one operation per use to avoid messy multi-action templates
    - `action` placeholder is reused in the comment and the method call for consistency

    ### Changelog

    - 1.0: initial
content: |
  const {{ name=myArray }} = [{{ items=1, 2, 3 }}];

  // {{ action=push|pop|shift|unshift|slice|splice }} action
  {{ name }}.{{ action }}({{ value=newItem }});

  console.log({{ name }});
