id:      "2026-05-08.01-DEMO"
version: 2
sc:      ""
short:   "Demo for all placeholder features"
usage:
  head: |
    Demo snippet — shows every placeholder type available in the app.
    Generates a code review request for a given file or module.

    Token usage: low
  maybe:
    Focus:
    Context:
    OutputFormat:
    Checklist:
  vars:
    FILE: MyClass.php
    LANGUAGE: PHP
    REVIEWER_ROLE: senior developer
  text: |

    ### Usage

    1. Fill in placeholders on the right panel
    2. Toggle optional sections on/off
    3. Copy the rendered prompt and paste into your AI tool

    ### Limitations

    - ...

    ### Features details

    Demonstrates all placeholder types in one snippet:

    | Feature | Syntax |
    |---|---|
    | Simple placeholder | `{{FILE}}` |
    | Default value | `{{REVIEWER_ROLE=senior developer}}` |
    | Option list | `{{LANGUAGE=PHP|TypeScript|Python}}` |
    | Optional block | `{{ MAYBE: Context }}` / `{{ END-MAYBE }}` |
    | Inline optional | same syntax, text merged into one line |
    | Include | `{{include: "Code Review Guidelines"}}` |

    <secondary>

    ### Prompt output handling

    - ...

    -- Tasks (color: red) --------

    -- Dev --------

    ### How it works

    A practical demo that requests a code review.
    Every placeholder type appears at least once in the template.

    ### Made with

    LLM:

    > You are a highly skilled developer and prompt engineer...

    ### Changelog

    - V1: Initial demo for LinkedIn article
    - V2: Replaced LinkedIn topic with code review prompt
content: |
  You are a {{REVIEWER_ROLE=senior developer|architect|security expert}} reviewing {{LANGUAGE=PHP|TypeScript|Python}} code.

  Please review the following file: {{FILE}}

  {{ MAYBE: Focus }}
  Focus especially on: {{FOCUS=performance|security|readability|maintainability}}
  {{ END-MAYBE }}

  Cover the following in your review:
  - Overall code quality and structure
  {{ MAYBE: Context }}
  - Consider the broader context: {{PROJECT_CONTEXT=this is a REST API|this runs in a CLI tool|this is a web frontend}}
  {{ END-MAYBE }}
  - Bugs, edge cases, or error handling gaps

  Write your review in
  {{ MAYBE: Focus }}
  with particular attention to {{FOCUS}},
  {{ END-MAYBE }}
  keeping feedback constructive and actionable.

  {{ MAYBE: OutputFormat }}
  Format the output as: {{FORMAT=a numbered list|inline comments|a summary paragraph}}
  {{ END-MAYBE }}

  {{ MAYBE: Checklist }}
  End with a short checklist of the most important things to fix.
  {{ END-MAYBE }}

  {{include: "LinkedIn Style Guide"}}
